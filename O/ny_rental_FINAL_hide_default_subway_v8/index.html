<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NY Rental Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="styles.css?v=final-good-v8-hide-default-subway" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">NY</div>
      <div>
        <h1>NY Rental Map</h1>
        <p>Sky-blue NYC rental search for students and new renters</p>
      </div>
    </div>
  </header>

  <main class="layout" id="layout">
    <section class="mapWrap">
      <div id="map"></div>
      <div class="nearbyToolbar hidden" id="nearbyToolbar">
        <div class="toolbarInfo">
          <span class="toolbarLabel">Nearby tools</span>
          <strong id="toolbarBuilding">Select a building</strong>
        </div>
        <div class="toolbarActions">
          <button data-nearby-toolbar="restaurant">Restaurants</button>
          <button data-nearby-toolbar="store">Stores</button>
          <button data-nearby-toolbar="subway">Subway</button>
          <button data-nearby-toolbar="clear" class="ghost">Clear</button>
        </div>
      </div>
    </section>

    <aside class="detailPanel hidden" id="detailPanel">
      <button class="closeBtn" id="closeDetail">×</button>
      <div id="detailContent"></div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="app.js?v=final-good-v8-hide-default-subway"></script>
</body>
</html>
